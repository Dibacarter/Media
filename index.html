<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khalil</title>
  <style>
    @font-face {
      font-family: 'BB Manual Mono Pro TX';
      src: url('https://www.khaliiil.com/BBManualMonoProTX-Regular.woff2') format('woff2');
    }
    body {
        font-family: 'BB Manual Mono Pro TX';
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'BB Manual Mono Pro TX';
      scroll-behavior: smooth;
      color: white;
    }
    .media-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: fixed;
      z-index: 1;
    }
    .media {
      position: relative;
      flex: 0 0 auto;
      width: 100%;
      cursor: pointer;
      user-select: none;
      pointer-events: auto;
      user-drag: none;
      -webkit-touch-callout: none;
    }
    .media video {
      width: 100%;
      height: auto;
      display: block;
    }
    .sound-icon {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      z-index: 10;
    }
    .sound-off-icon {
      display: block;
    }
    .sound-on-icon {
      display: none;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      touch-action: pan-x pan-y;
    }
    body.no-scroll {
      overflow: hidden;
    }
    #overlay-content {
      width: 100%;
      height: 100%;
      overflow: auto;
      padding-bottom: 30%;
      position: fixed;
      touch-action: pan-x pan-y;
    }
    #close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      width: 30px;
      height: auto;
      user-select: none;
      pointer-events: auto;
      user-drag: none;
      -webkit-touch-callout: none;
    }
    .nav-btn {
      position: absolute;
      transform: translateY(-50%);
      cursor: pointer;
      z-index: 10000;
      padding: 5px 16px;
      user-select: none;
      pointer-events: auto;
      user-drag: none;
      -webkit-touch-callout: none;
    }
    #prev-btn {
      left: 65px;
      border: 3px solid #275c86;
      top: 50px;
    }
    #next-btn {
      right: 65px;
      top: 50px;
    }
    .nav-btn img {
      display: block;
      max-width: 100%;
      height: auto;
      width: 17px;
      user-select: none;
      pointer-events: auto;
      user-drag: none;
      -webkit-touch-callout: none;
    }
    video::-webkit-media-controls {
      display: none !important;
    }
    video::-webkit-media-controls-start-playback-button {
      display: none !important;
    }
    video::-webkit-media-controls-play-button,
    video::-webkit-media-controls-start-playback-button,
    video::-webkit-media-controls-current-time-display,
    video::-webkit-media-controls-time-remaining-display,
    video::-webkit-media-controls-timeline,
    video::-webkit-media-controls-mute-button,
    video::-webkit-media-controls-toggle-closed-captions-button,
    video::-webkit-media-controls-volume-slider {
      display: none !important;
    }
    video::-webkit-media-controls-panel,
    video::-webkit-media-controls-panel *,
    video::-webkit-media-controls-panel > * {
      display: none !important;
    }
    video::-webkit-media-controls-overlay-play-button,
    video::-webkit-media-controls-overflow-button,
    video::-webkit-media-controls-enclosure,
    video::-webkit-media-controls-start-playback-button,
    video::-webkit-media-controls-background,
    video::-webkit-media-controls-timeline,
    video::-webkit-media-controls-current-time-display,
    video::-webkit-media-controls-time-remaining-display,
    video::-webkit-media-controls-mute-button,
    video::-webkit-media-controls-volume-slider-container,
    video::-webkit-media-controls-volume-slider {
      display: none !important;
    }
    video::-webkit-media-controls-fullscreen-button,
    video::-webkit-media-controls-rewind-button,
    video::-webkit-media-controls-return-to-realtime-button,
    video::-webkit-media-controls-toggle-closed-captions-button,
    video::-webkit-media-controls-toggle-closed-captions-track-list,
    video::-webkit-media-controls-toggle-play-button {
      display: none !important;
    }
    video::-webkit-media-controls-play-button,
    video::-webkit-media-controls-pause-button,
    video::-webkit-media-controls-seek-back-button,
    video::-webkit-media-controls-seek-forward-button,
    video::-webkit-media-controls-toggle-closed-captions-button,
    video::-webkit-media-controls-timeline,
    video::-webkit-media-controls-timeline-container,
    video::-webkit-media-controls-volume-slider,
    video::-webkit-media-controls-volume-slider-container {
      display: none !important;
    }
  </style>
</head>
<body bgcolor="black">
  <div class="media-container">
    <div class="media">
      <video src="https://www.khaliiil.com/REn2.mov" alt="media_home_9009" autoplay loop muted playsinline></video>
      <img style="filter: grayscale(100%) invert(100%);" src="volume-mute.png" class="sound-icon sound-off-icon" alt="Sound Off">
      <img style="filter: grayscale(100%) invert(100%);" src="volume.png" class="sound-icon sound-on-icon" alt="Sound On">
    </div>
    <img class="media" src="https://www.khaliiil.com/IMG_7634.jpg" alt="media_home_9011">
    <img class="media" src="https://www.khaliiil.com/IMG_7632.jpg" alt="media_home_9010">
    <img class="media" src="https://www.khaliiil.com/St.GIF" alt="media_home_9009">
    <img class="media" src="https://www.khaliiil.com/Cl.GIF" alt="media_home_9007">
    <img class="media" src="https://www.khaliiil.com/T-1.JPG" alt="media_home_9006">
    <img class="media" src="https://www.khaliiil.com/Bu.GIF" alt="media_home_9003">
    <img class="media" src="https://www.khaliiil.com/mediaOf/5a67e1ae-0c7b-494c-8440-3eb7d7f35ac9.jpeg" alt="media_home_9002">
  </div>
  <div id="overlay">
    <span id="prev-btn" class="nav-btn">
      <img src="https://khaliiil.com/prev.PNG" alt="Previous">
    </span>
    <div id="overlay-content"></div>
    <span id="next-btn" class="nav-btn">
      <img src="https://khaliiil.com/next.PNG" alt="Next">
    </span>
    <img id="close-btn" src="https://khaliiil.com/Xbtn.PNG" alt="Close">
  </div>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const mediaElements = document.querySelectorAll('.media');
    const overlay = document.getElementById('overlay');
    const overlayContent = document.getElementById('overlay-content');
    const closeBtn = document.getElementById('close-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    let currentIndex = 0;
    let currentOverlayVideo = null;

    function disableScroll() {
      document.body.classList.add('no-scroll');
    }

    function enableScroll() {
      document.body.classList.remove('no-scroll');
    }

    function muteAllVideos() {
      mediaElements.forEach(media => {
        if (media.querySelector('video')) {
          const video = media.querySelector('video');
          video.muted = true;
          const soundOffIcon = media.querySelector('.sound-off-icon');
          const soundOnIcon = media.querySelector('.sound-on-icon');
          soundOffIcon.style.display = 'block';
          soundOnIcon.style.display = 'none';
          video.play();  // Ensure video keeps playing
        }
      });
    }

    function playAllVideos() {
      mediaElements.forEach(media => {
        if (media.querySelector('video')) {
          const video = media.querySelector('video');
          video.play();
        }
      });
    }

    function openOverlay(index) {
      disableScroll();
      currentIndex = index;
      const clonedMedia = mediaElements[currentIndex].cloneNode(true);
      overlayContent.innerHTML = '';
      overlayContent.appendChild(clonedMedia);
      overlay.style.display = 'flex';
      overlay.classList.add('overlay-show');

      // Mute all main page videos when overlay is opened
      muteAllVideos();

      if (clonedMedia.querySelector('video')) {
        const video = clonedMedia.querySelector('video');
        const soundOffIcon = clonedMedia.querySelector('.sound-off-icon');
        const soundOnIcon = clonedMedia.querySelector('.sound-on-icon');

        video.muted = true;
        soundOffIcon.style.display = 'block';
        soundOnIcon.style.display = 'none';

        soundOffIcon.addEventListener('click', () => {
          video.muted = false;
          soundOffIcon.style.display = 'none';
          soundOnIcon.style.display = 'block';
        });

        soundOnIcon.addEventListener('click', () => {
          video.muted = true;
          soundOffIcon.style.display = 'block';
          soundOnIcon.style.display = 'none';
        });

        currentOverlayVideo = video;
        video.play();
      }
    }

    function closeOverlay() {
      overlay.style.display = 'none';
      enableScroll();
      if (currentOverlayVideo) {
        currentOverlayVideo.muted = true;
        currentOverlayVideo = null;
      }
      playAllVideos();  // Ensure main page videos continue playing
    }

    mediaElements.forEach((media, index) => {
      if (media.querySelector('video')) {
        const video = media.querySelector('video');
        const soundOffIcon = media.querySelector('.sound-off-icon');
        const soundOnIcon = media.querySelector('.sound-on-icon');

        // Remove the controls attribute
        video.removeAttribute('controls');

        video.play();

        soundOffIcon.addEventListener('click', () => {
          muteAllVideos();
          video.muted = false;
          soundOffIcon.style.display = 'none';
          soundOnIcon.style.display = 'block';
        });

        soundOnIcon.addEventListener('click', () => {
          video.muted = true;
          soundOffIcon.style.display = 'block';
          soundOnIcon.style.display = 'none';
        });
      }

      media.addEventListener('click', (event) => {
        if (event.target !== media.querySelector('.sound-off-icon') && event.target !== media.querySelector('.sound-on-icon')) {
          openOverlay(index);
        }
      });
    });

    closeBtn.addEventListener('click', closeOverlay);

    prevBtn.addEventListener('click', () => {
      if (currentIndex === 0) {
        currentIndex = mediaElements.length - 1;
      } else {
        currentIndex -= 1;
      }
      openOverlay(currentIndex);
    });

    nextBtn.addEventListener('click', () => {
      if (currentIndex === mediaElements.length - 1) {
        currentIndex = 0;
      } else {
        currentIndex += 1;
      }
      openOverlay(currentIndex);
    });
  });
</script>
            </body>
            </html>
